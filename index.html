<!DOCTYPE html>
<html>

<head>
    <title>My Home Page</title>
    <script src="jquery-4.0.0.min.js"></script>
    <script>
        $(document).ready(function () {
            $("#btn1").click(function () {
                $("h1").fadeIn(1500);

            });
        });
        $(document).ready(function () {

            $("p").slideDown(1500);
        });

        $("#btn1").ready(function () {
            alert("Welcome to Marvel World!");
        });



    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial;
        }

        body {
            background: #111;
            color: white;

        }

        /* Header */
        header {
            background: black;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            color: red;
            font-weight: bold;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-size: 18px;
        }

        nav a:hover {
            color: red;
        }

        img {
            border-radius: 20px;
            transition: transform 5s;


        }

        img:hover {
            transform: skewY(180deg);
        }

        .hero {
            height: 90vh;
            background-image: url("https://i.pinimg.com/736x/cd/0d/05/cd0d0588e15b584d146560573104bf74.jpg");
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
            background-blend-mode: darken;
            background-color: rgba(0, 0, 0, 0.6);
        }

        .hero h1 {
            font-size: 50px;
            margin-bottom: 20px;
            display: none;
        }

        .hero p {
            font-size: 20px;
            margin-bottom: 20px;
            width: 60%;
            display: none;
        }

        input {
            padding: 12px 30px;
            font-size: 18px;
            background: red;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        .hero button:hover {
            background: black;
            color: red;
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">MyWebsite</div>
        <nav>
            <a href="home.html">Home</a>
            <a href="index.html">movie</a>
            <a href="heros.html">about</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <section class="hero">

        <h1>Welcome to Marvel World</h1>
        <p>The Avengers are a group of powerful superheroes who work together to protect Earth from dangerous threats.

            They include famous heroes like Iron Man, Captain America, Thor, and Hulk.

        </p><br>
        <input type="button" value="Explore" id="btn1"><br>

    </section>





</body>

</html>
